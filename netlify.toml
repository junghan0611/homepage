[build]
publish = "public"
# production: use the canonical baseURL from hugo.yaml (https://junghanacs.com/).
# Do NOT override with $DEPLOY_PRIME_URL here — that leaks the netlify.app deploy
# host into canonical/og:url/permalinks (and JSON-LD @id) on the live site.
command = "hugo --gc --minify"

[build.environment]
HUGO_VERSION = "0.156.0"
NODE_VERSION = "22"

# Preview/branch builds get the dynamic deploy URL so their links are self-consistent.
[context.deploy-preview]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"
